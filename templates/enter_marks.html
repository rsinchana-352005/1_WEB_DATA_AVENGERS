<!DOCTYPE html>
<html>
<head>
    <title>Enter Marks & Attendance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-image">

<div class="overlay">

    <h2>Enter Marks & Attendance</h2>

    <h3>Subject: {{ subject }}</h3>

    <!-- SUCCESS MESSAGE (OPTIONAL) -->
    {% if request.args.get('success') %}
        <p style="color: lightgreen; font-weight: bold;">
            ✅ Data Saved Successfully!
        </p>
    {% endif %}

    <form method="POST">

        <input type="text" name="usn" placeholder="Student USN" required><br>

        <input type="number" name="ia1" placeholder="IA1 (out of 20)" required><br>

        <input type="number" name="ia2" placeholder="IA2 (out of 20)" required><br>

        <input type="number" name="ia3" placeholder="IA3 (out of 20)" required><br>

        <input type="number" name="attendance" placeholder="Attendance (%)" required><br>

        <button type="submit">Save</button>

    </form>

    <br>

    <!-- 🔙 BACK BUTTON -->
    <button onclick="window.location.href='/faculty_dashboard?name={{ name }}'">
    Back to Dashboard
    </button>
</div>

</body>
</html>
