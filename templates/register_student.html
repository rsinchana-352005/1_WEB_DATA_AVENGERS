<!DOCTYPE html>
<html>
<head>
    <title>Register Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-image">

<div class="overlay">

    <h2>Register Student</h2>

    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <p style="color: lightgreen; font-weight: bold;">
          {{ messages[0] }}
        </p>
      {% endif %}
    {% endwith %}

    <!-- FORM -->
    <form method="POST">

        <input type="text" name="name" placeholder="Name" required><br>

        <input type="text" name="usn" placeholder="USN" required><br>

        <input type="text" name="department" placeholder="Department" required><br>

        <input type="number" name="semester" placeholder="Semester" required><br>

        <input type="password" name="password" placeholder="Password" required><br>

        <button type="submit">Register</button>

    </form>

    <br>

   
    <button onclick="window.location.href='/admin_dashboard'">
        Back to Dashboard
    </button>

</div>

</body>
</html>
